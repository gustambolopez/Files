<link rel="preconnect" href="https://fonts.googleapis.com/" /><link
  rel="preconnect"
  href="https://fonts.gstatic.com/"

  rel="stylesheet"
/><style>
  @font-face {
    font-family: "SF Pro Display";
    font-style: normal;
    font-weight: 400;
    src: url("https://cdn.jsdelivr.net/gh/gustambolopez/Files@main/sf-pro-display_regular.woff2")
      format("woff2");
    font-display: swap;
  }
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    letter-spacing: 1px;
  }
  body {
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, Helvetica, Arial, sans-serif;
    text-rendering: antialiased;
    background-color: #1f1f1f;
    width: 100%;
    font-weight: 400;
    height: 100vh;
    min-height: 700px;
    overflow: hidden;
    position: relative;
  }
  .backdrop {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse 120% 80% at 30% 60%,
      #ac1412 0%,
      #ffd03f 60%,
      #de5a27 100%
    );
    z-index: 0;
  }
  .backdrop-art {
    position: absolute;
    inset: 0;
    background-image: url("https://is1-ssl.mzstatic.com/image/thumb/Music211/v4/04/3b/86/043b863f-18fa-c9ea-47a3-ac7f458cbf75/5063916228659.jpg/600x600bb-60.jpg");
    background-size: cover;
    background-position: center;
    filter: blur(60px) saturate(1.5);
    opacity: 0.35;
    transform: scale(1.1);
        background: radial-gradient(
      ellipse 120% 80% at 30% 60%,
      #ac1412 0%,
      #ffd03f 60%,
      #de5a27 100%
    );
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr;
    height: 100vh;
    min-height: 700px;
    padding: 0 32vw;
    align-items: center;
    justify-items: center;
  }
  .close-btn {
    position: absolute;
    top: 16px;
    left: 20px;
    width: 13px;
    height: 13px;
    background: none;
    border: none;
    cursor: pointer;
    fill: rgba(255, 255, 255, 0.805);
    z-index: 10;
  }
  .close-btn svg {
    width: 100%;
    height: 100%;
  }

  /* CONTROLS GRID — tight row gaps */
  .controls {
    display: grid;
    grid-template-rows: auto auto auto auto auto auto;
    row-gap: 0;
    height: fit-content;
    max-width: 400px;
    width: 100%;
    place-items: center;
  }

  /* ARTWORK */
  .artwork-wrapper {
    position: relative;
    width: 100%;
    margin-bottom: 0;
  }
  .artwork-radiosity {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    overflow: hidden;
    filter: blur(20px) saturate(2);
    opacity: 0.4;
    transform: scale(0.92) translateY(8px);
    transform-origin: center bottom;
  }
  .artwork-radiosity img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .artwork-container {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    border: rgb(69, 69, 69) 0.01px solid;
  }
  .artwork-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* METADATA */
  .metadata {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px 0 6px;
    gap: 8px;
  }
  .lcd-meta {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .lcd-primary {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.25;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .explicit-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    opacity: 0.8;
  }
  .lcd-secondary {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
    margin-top: 1px;
  }
  .accessory-buttons {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .fav-btn,
  .more-btn {
    background: rgba(255, 255, 255, 0.1);
    border: none;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(10px);
  }

  /* SCRUBBER */
  .scrubber-area {
    width: 100%;
    padding: 0 0 6px;
    align-self: start;
  }
  .progress-track {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.25);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .progress-track:hover .progress-thumb {
    transform: translateY(-50%) scale(1.3);
  }
  .progress-elapsed {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 2px;
    position: relative;
    pointer-events: none;
  }
  .progress-thumb {
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    transition: transform 0.15s ease;
    pointer-events: none;
  }
  .time-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
  }
  .time-label {
    font-size: 8px;
    color: rgba(255, 255, 255, 0.55);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* PLAYBACK CONTROLS — reduced gaps, no extra padding */
  .playback-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    padding: 2px 0;
  }
  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    opacity: 0.9;
    padding: 0;
    width: 50px;
    height: 50px;
  }
  .ctrl-btn svg {
    width: 32px;
    height: 32px;
  }
  .ctrl-btn.shuffle {
    opacity: 0.55;
  }
  .ctrl-btn.repeat {
    opacity: 0.55;
  }
  .ctrl-btn.repeat.active {
    opacity: 1;
    color: #fff;
    position: relative;
  }
  .ctrl-btn.repeat.active::after {
    content: "";
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
  }
  .play-btn {
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .play-btn svg {
    width: 36px;
    height: 36px;
  }

  /* VOLUME */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 4px 0 0;
  }
  .vol-icon,
  .vol-icon-max {
    color: rgba(255, 255, 255, 0.55);
    flex-shrink: 0;
  }
  .vol-track {
    flex: 1;
    height: 4px;
    background: rgba(255, 255, 255, 0.25);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .vol-track:hover .vol-thumb {
    transform: translateY(-50%) scale(1.3);
  }
  .vol-elapsed {
    height: 100%;
    width: 70%;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 2px;
    position: relative;
    pointer-events: none;
  }
  .vol-thumb {
    width: 12px;
    height: 12px;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 50%;
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    transition: transform 0.15s ease;
    pointer-events: none;
  }
</style>

<script>
  const audio = document.getElementById("audio");
  const playBtn = document.getElementById("playBtn");
  const iconPlay = document.getElementById("iconPlay");
  const iconPause = document.getElementById("iconPause");
  const repeatBtn = document.getElementById("repeatBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const progressTrack = document.getElementById("progressTrack");
  const progressElapsed = document.getElementById("progressElapsed");
  const timeElapsed = document.getElementById("timeElapsed");
  const timeRemaining = document.getElementById("timeRemaining");
  const volTrack = document.getElementById("volTrack");
  const volElapsed = document.getElementById("volElapsed");

  let isRepeating = false;
  let isDraggingProgress = false;
  let isDraggingVolume = false;

  // Set initial volume to match the 70% display
  audio.volume = 0.7;

  // Format seconds as M:SS
  function fmt(secs) {
    if (isNaN(secs) || !isFinite(secs)) return "0:00";
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${m}:${s.toString().padStart(2, "0")}`;
  }

  // Play / Pause
  playBtn.addEventListener("click", () => {
    if (audio.paused) {
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }
  });

  audio.addEventListener("play", () => {
    iconPlay.style.display = "none";
    iconPause.style.display = "block";
  });

  audio.addEventListener("pause", () => {
    iconPlay.style.display = "block";
    iconPause.style.display = "none";
  });

  // Time update — move scrubber
  audio.addEventListener("timeupdate", () => {
    if (isDraggingProgress) return;
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    progressElapsed.style.width = pct + "%";
    timeElapsed.textContent = fmt(audio.currentTime);
    timeRemaining.textContent = audio.duration
      ? "-" + fmt(audio.duration - audio.currentTime)
      : "-0:00";
  });

  // Ended — handle repeat
  audio.addEventListener("ended", () => {
    if (isRepeating) {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }
  });

  // Repeat toggle
  repeatBtn.addEventListener("click", () => {
    isRepeating = !isRepeating;
    repeatBtn.classList.toggle("active", isRepeating);
    audio.loop = isRepeating;
  });

  // Previous — restart if past 3s, else just restart
  prevBtn.addEventListener("click", () => {
    audio.currentTime = 0;
    if (audio.paused) audio.play().catch(() => {});
  });

  // Next — seek to end (triggers ended logic)
  nextBtn.addEventListener("click", () => {
    if (audio.duration) {
      audio.currentTime = audio.duration - 0.01;
    }
  });

  // --- Progress scrubber dragging ---
  function getProgressPct(e) {
    const rect = progressTrack.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return Math.max(0, Math.min(1, x / rect.width));
  }

  progressTrack.addEventListener("mousedown", (e) => {
    isDraggingProgress = true;
    seekTo(e);
  });
  progressTrack.addEventListener(
    "touchstart",
    (e) => {
      isDraggingProgress = true;
      seekTo(e);
    },
    { passive: true },
  );

  function seekTo(e) {
    const pct = getProgressPct(e);
    progressElapsed.style.width = pct * 100 + "%";
    if (audio.duration) {
      audio.currentTime = pct * audio.duration;
      timeElapsed.textContent = fmt(audio.currentTime);
      timeRemaining.textContent = "-" + fmt(audio.duration - audio.currentTime);
    }
  }

  document.addEventListener("mousemove", (e) => {
    if (isDraggingProgress) seekTo(e);
    if (isDraggingVolume) setVolume(e);
  });
  document.addEventListener(
    "touchmove",
    (e) => {
      if (isDraggingProgress) seekTo(e);
      if (isDraggingVolume) setVolume(e);
    },
    { passive: true },
  );
  document.addEventListener("mouseup", () => {
    isDraggingProgress = false;
    isDraggingVolume = false;
  });
  document.addEventListener("touchend", () => {
    isDraggingProgress = false;
    isDraggingVolume = false;
  });

  // --- Volume scrubber dragging ---
  function getVolumePct(e) {
    const rect = volTrack.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    return Math.max(0, Math.min(1, x / rect.width));
  }

  volTrack.addEventListener("mousedown", (e) => {
    isDraggingVolume = true;
    setVolume(e);
  });
  volTrack.addEventListener(
    "touchstart",
    (e) => {
      isDraggingVolume = true;
      setVolume(e);
    },
    { passive: true },
  );

  function setVolume(e) {
    const pct = getVolumePct(e);
    audio.volume = pct;
    volElapsed.style.width = pct * 100 + "%";
  }
</script>
